# BCT + Instruct mix (SFT) on gpt-oss-120b
# Same data as bct_sa_tqa_120b, but training data is BCT non-cot concatenated with instruct:half
# Note: requires pre-existing instruct.jsonl in the sa-tqa output directory

name: bct_sa_tqa_120b_inst
model: openai/gpt-oss-120b

data_generation:
  script: generate_bct_from_test
  args:
    bias: suggested_answer
    datasets: [truthfulqa]
    limits: [800]
    max_tokens: 8192
    temperature: 1.0
    non_cot: true                  # requires --non-cot flag in generate_bct_from_test.py
    output_name: sa-tqa

data_preparation:
  enabled: true
  args:
    inputs:
      - "auto:bct_non_cot"         # resolves to dataset_dumps/train_seed_42/gpt-oss-120b/sa-tqa/bct_non_cot.jsonl
      - "auto:instruct:half"       # resolves to dataset_dumps/train_seed_42/gpt-oss-120b/sa-tqa/instruct.jsonl (pre-generated)
    shuffle: true
    output: dataset_dumps/train_seed_42/gpt-oss-120b/sa-tqa/mixed.jsonl

training:
  method: sft
  seeds: [0, 42, 123]
  include_control: true
  data_mode: concat
  args:
    experiment_name: bct_sa_tqa_120b_inst
    run_name: gpt-bct-sa-tqa-inst
    data: auto
    batch_size: 128
    epochs: 1
    lora_rank: 8
    save_every: 9999               # effectively final-only (save_every=0 causes ZeroDivisionError)
    # lr omitted → auto-detection (falls back to 1e-4 for gpt-oss-120b)

evaluation:
  include_base: true
  args:
    bias_types: "spurious_few_shot_squares,post_hoc,wrong_few_shot,are_you_sure,suggested_answer"
    datasets: hellaswag
    prompt_styles: no_cot
    limit: 100
    max_tokens: 8192
    max_tasks: 50
    log_dir: sycophancy_eval_inspect/logs/bct_sa_tqa_120b_inst
    base_model: openai/gpt-oss-120b

analysis:
  args:
    bir: true
    ba: true
    plot: true
    variance_across: seeds

viz_registration:
  dir_suffix: bct_sa_tqa_120b_inst
  display_name: "BCT + Instruct"
  color: "#4292c6"
  control_color: "#c6dbef"
  training_biases: [suggested_answer]
